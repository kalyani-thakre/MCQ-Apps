<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Codeline.AI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>Codeline.AI</h1>

  <div id="page1">
    <div class="user-details">
      <input type="text" id="name" placeholder="Enter Name">
      <input type="email" id="email" placeholder="Enter Email">
      <input type="text" id="mobile" placeholder="Enter Mobile Number">
    </div>

    <button class="start-btn" id="sendOtpBtn" onclick="sendOTP()">
      Send OTP to Email
    </button>

    <div id="otpContainer" style="display:none;">
      <input type="text" id="otpInput" placeholder="OTP" maxlength="4">
      
      <button class="start-btn" id="verifyOtpBtn" onclick="verifyOTP()">
        Verify OTP & Start Exam
      </button>
    </div>
  </div>

  <div id="page2" style="display:none;">
    <div class="exam-layout">
      
      <div class="left-panel">
        <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #e5e7eb; padding-bottom: 10px; margin-bottom: 20px;">
          <div id="qcount" style="font-size: 20px; font-weight: bold; color: #333;">Question 1 / 80</div>
        </div>

        <div id="quiz"></div>

        <div class="btn-row">
          <button class="next-btn" onclick="nextQuestion()">Save & Next</button>
          <button class="skip-btn" onclick="skipQuestion()">Skip</button>
          <button class="review-btn" onclick="previousQuestion()">Previous</button>
        </div>

        <div style="margin-top:15px;">
          <button class="submit-btn" id="submitBtn" onclick="submitQuiz()" style="width:100%; padding:16px; border-radius:10px; font-size:20px; display: none !important;">
            Submit
          </button>
        </div>
      </div>

      <div style="flex: 1.3; display: flex; flex-direction: column;">
        
        <div id="timer" style="font-size: 28px !important; font-weight: bold !important; color: #000000 !important; font-family: Arial, sans-serif !important; text-align: right !important; margin-bottom: 10px !important; padding-right: 5px;">30:00</div>
        
        <div class="right-panel" style="margin-top: 0; flex: 1;">
          <h3 style="margin-top: 0;">Questions</h3>
          <div id="questionNumbers" class="question-grid"></div>
        </div>

      </div>

    </div>
  </div>

  <div id="page3" style="display:none;">
    <div id="result"></div>
  </div>
</div>

<!-- Yahan ?v=1.1 add kiya hai taaki purani cache clear ho jaye -->
<script src="script.js?v=1.1"></script>
</body>
</html>
